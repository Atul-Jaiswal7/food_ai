<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriLens — Offline</title>
  <style>
    :root {
      --accent: #5bb8a8;
      --bg: #f6f7f8;
      --text: #172126;
      --text-muted: #7a858b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 3rem 2rem;
      border-radius: 2.5rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.03);
      border: 1px solid #e6eaec;
      max-width: 400px;
      width: 100%;
    }
    .icon-container {
      width: 80px;
      height: 80px;
      background: #f0f7f6;
      border-radius: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2.5rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }
    p {
      color: var(--text-muted);
      line-height: 1.6;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .retry {
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 1.25rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }
    .retry:active {
      transform: scale(0.98);
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-container">📶</div>
    <h1>You're Offline</h1>
    <p>NutriLens needs an internet connection to analyze your food and provide nutritional data.</p>
    <button class="retry" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
